# vim:ft=conf
shell_integration no-cursor
# Font settings
font_size 24.0

disable_ligatures never
# modify_font cell_width 80%
# modify_font cell_height 102%
# modify_font baseline 3

# Cursor settings
cursor_trail 10
cursor_trail_start_threshold 0
cursor_trail_decay 0.01 0.15
cursor_shape underline
cursor_blink_interval -1
# Window decorations
# Set to "no" to display a top bar for dragging and moving the window
# Use "smart" to hide decorations when maximized but show in windowed mode
hide_window_decorations titlebar-only
window_margin_width 0
window_padding_width 0
# Miscellaneous settings
# Enable option key as Alt on macOS
macos_option_as_alt yes
# Set scrollback lines maximum
scrollback_lines 1000000

# Copy on select
# Automatically copy text to the clipboard when selected
copy_on_select yes

include oasis_desert.conf


# BEGIN_KITTY_FONTS
font_family      family="PragmataPro Mono Liga" features="+calt +cv03 +cv04 +ss11 +ss13 +ss14 +ss15 +ss17 +ss18 +ss20"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
#
#
# BEGIN_KITTY_SYMBOL_MAPS
symbol_map U+E000-U+F8FF,U+F0000-U+FFFFF,U+100000-U+10ffff FiraCode Nerd Font
symbol_map U+2E80-U+2EFF,U+2F00-U+2FDF,U+3000-U+303F,U+31C0-U+31EF,U+3400-U+4DBF,U+4E00-U+9FFF,U+F900-U+FAFF,U+FE30-U+FE4F,U+FF00-U+FFEF,U+20000-U+2A6DF,U+2A700-U+2B73F,U+2B740-U+2B81F,U+2B820-U+2CEAF,U+2CEB0-U+2EBEF,U+2EBF0-U+2EE5F,U+30000-U+3134F,U+31350-U+323AF Maple Mono NF CN
symbol_map U+2300-U+23FF,U+2600-U+27BF,U+1F000-U+1FAFF Apple Color Emoji
# END_KITTY_SYMBOL_MAPS
