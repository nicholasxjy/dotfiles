tmux_dir="~/.config/tmux"
tmux_conf_dir="$tmux_dir/conf"
tmux_plugins_dir="$tmux_dir/plugins"
#
# set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ',xterm-256color:RGB'

# Undercurl & Underscore colors support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# set -g default-terminal "${TERM}"

set -gq allow-passthrough on
set -g visual-activity off
# Use the mouse
set -g mouse on
set -g set-clipboard on

set -g extended-keys on
set -g extended-keys-format csi-u

# Enables tracking of focus events, allows tmux to respond when the terminal
# window gains or looses focus
set-option -g focus-events on

# Sticky time after repeated commands
set -sg repeat-time 500

# Start numbering at 1 for windows and panes
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows if others are closed
set -g renumber-windows on

# Automatically rename windows based on the application within
set -g automatic-rename on
set -g automatic-rename-format "#{s|$HOME|~|:pane_current_path}"

# Use titles in tabs
set -g set-titles on
set -s escape-time 0

set -g detach-on-destroy off

# Enable vi keys.
setw -g mode-keys vi
# Bind Esc to exit copy-mode
bind-key -T copy-mode-vi 'Escape' send -X cancel
# start selecting text with "v", this is visual mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
# copy text with "y"
bind-key -T copy-mode-vi 'y' send -X copy-selection
# don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane


set -g status-interval 3

# Increase scrollback buffer size
set -g history-limit 1000000

# Change prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

bind-key x kill-pane
bind-key & kill-window

# Reload config
bind r source-file ~/.tmux.conf \; \
display-message "Config Reloaded."

unbind '"'
unbind %

# Resizing panes with Prefix H,J,K,L
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5

bind -n M-h previous-window
bind -n M-l next-window
bind -n M-t new-window
bind -n M-x kill-pane

bind -n M-s choose-tree -s

bind \\ split-pane -h -c "#{pane_current_path}"
bind - split-pane -v -c "#{pane_current_path}"


bind-key -n M-Left swap-window -t -1
bind-key -n M-Right swap-window -t +1

bind-key -n M-n split-pane -h -c "#{pane_current_path}"
bind-key -n M-d split-pane -v -c "#{pane_current_path}"

bind-key "o" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -x 0 -y 100% -p 100%,40% \
    --no-sort --ansi --border none --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'ctrl-j:down,ctrl-k:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:50%' \
    --preview 'sesh preview {}'
)\""


TMUX_FZF_LAUNCH_KEY="h"

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'sainnhe/tmux-fzf'

# =========================================================================================
# Zellij-inspired status bar / tab bar
set-option -g status-position top
set-option -g status-interval 1
set-option -g status-justify left
set-option -g status-style "bg=#1b1f3a,fg=#eaf2ff"
set-option -g message-style "bg=#1b1f3a,fg=#f5f7ff"
set-option -g mode-style "bg=#ffd400,fg=#0b0f1a,bold"
set-option -g status-left-length 60
set-option -g status-right-length 90

# Left: Zellij-like mode block + session name
set -g @mode_style_normal "#[fg=#0b0f1a,bg=#00f5a0,bold]"
set -g @mode_style_prefix "#[fg=#0b0f1a,bg=#ff4fd8,bold]"
set -g @mode_style_copy "#[fg=#0b0f1a,bg=#ffd400,bold]"
set -g @mode_style_sync "#[fg=#0b0f1a,bg=#9d7dff,bold]"
set -g @mode_edge_normal "#[fg=#00f5a0,bg=#1b1f3a]"
set -g @mode_edge_prefix "#[fg=#ff4fd8,bg=#1b1f3a]"
set -g @mode_edge_copy "#[fg=#ffd400,bg=#1b1f3a]"
set -g @mode_edge_sync "#[fg=#9d7dff,bg=#1b1f3a]"
set -g @session_style "#[fg=#ffd400,bg=#1b1f3a,bold]"
set -g @session_edge "#[fg=#1b1f3a,bg=#1b1f3a]"
set-option -g status-left "#{?client_prefix,#{@mode_style_prefix} PREFIX ,#{?pane_in_mode,#{@mode_style_copy} COPY ,#{?pane_synchronized,#{@mode_style_sync} SYNC ,#{@mode_style_normal} NORMAL }}}#{?client_prefix,#{@mode_edge_prefix},#{?pane_in_mode,#{@mode_edge_copy},#{?pane_synchronized,#{@mode_edge_sync},#{@mode_edge_normal}}}}#{@session_style} 󱂬 #S #{@session_edge}#[default]"

# Middle: window list follows the session block on the left
set-window-option -g window-status-separator ""
set -g @tab_style_normal "#[fg=#f5f7ff,bg=#1b1f3a,bold]"
set -g @tab_style_activity "#[fg=#f5f7ff,bg=#1b1f3a,bold]"
set -g @tab_style_bell "#[fg=#f5f7ff,bg=#1b1f3a,bold]"
set -g @tab_style_current "#[fg=#0b0f1a,bg=#00c8ff,bold]"
set -g @tab_edge_normal "#[fg=#1b1f3a,bg=#1b1f3a]"
set -g @tab_edge_activity "#[fg=#1b1f3a,bg=#1b1f3a]"
set -g @tab_edge_bell "#[fg=#1b1f3a,bg=#1b1f3a]"
set -g @tab_edge_current_left "#[fg=#1b1f3a,bg=#00c8ff]"
set -g @tab_edge_current_right "#[fg=#00c8ff,bg=#1b1f3a]"
set-window-option -g window-status-format "#{?window_bell_flag,#{@tab_style_bell},#{?window_activity_flag,#{@tab_style_activity},#{@tab_style_normal}}} #I #(~/.config/tmux/scripts/window_icon.sh '#{pane_current_command}') #W #{?window_bell_flag,#{@tab_edge_bell},#{?window_activity_flag,#{@tab_edge_activity},#{@tab_edge_normal}}}#[default]"
set-window-option -g window-status-current-format "#{@tab_edge_current_left}#{@tab_style_current} #I #(~/.config/tmux/scripts/window_icon.sh '#{pane_current_command}') #W #{@tab_edge_current_right}#[default]"
set-window-option -g window-status-activity-style "fg=#f5f7ff,bg=#1b1f3a,bold"
set-window-option -g window-status-bell-style "fg=#f5f7ff,bg=#1b1f3a,bold"

# Right: compact host + time blocks
set -g @right_style_host "#[fg=#0b0f1a,bg=#00f0ff,bold]"
set -g @right_edge_host "#[fg=#01f0ff,bg=default]"
set -g @right_style_time "#[fg=#0b0f1a,bg=#ff8a00,bold]"
set -g @right_edge_time "#[fg=#ff8a00,bg=default]"
set-option -g status-right "#{?client_prefix,#[fg=#0b0f1a,bg=#ff4fd8,bold] TMUX ,}#{@right_edge_host}#{@right_style_host} #h #{@right_edge_time}#{@right_style_time} %a %Y-%m-%d %H:%M "
# =========================================================================================

set -g @yank_with_mouse on                          # Just select with the mouse to copy

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @vim_navigator_mapping_left "C-h"  # use C-h and C-Left
set -g @vim_navigator_mapping_right "C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""  # removes the C-\ binding

set -g @plugin 'navahas/tmux-grimoire'
set -g @grimoire-color '#6c67ea'
set -g @grimoire-position 'bottom-left'
set -g @grimoire-title ' SETSU '
set -g @grimoire-width '90%'          # Width as percentage
set -g @grimoire-height '70%'         # Height as percentage


set -g @plugin 'laktak/extrakto'

# Pane borders: use stronger contrast so the active pane pops out clearly
# single -> single lines using ACS or UTF-8 characters
# double -> double lines using UTF-8 characters
# heavy  -> heavy lines using UTF-8 characters
# simple -> simple ASCII characters
# number -> the pane number
set -g pane-border-lines single
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#ff8a00"

# Indicate active pane by colouring only half of the border in windows with
# exactly two panes, by displaying arrow markers, by drawing both or neither.
# [off | colour | arrows | both]
set -g pane-border-indicators both

set -g pane-border-status bottom
set -g pane-border-format "#[fg=#ff8a00,bg=default,bold] #{pane_start_command} | #{pane_current_command} #{s|#{HOME}|~|:pane_current_path}"

# Run tpm
run '~/.tmux/plugins/tpm/tpm'
