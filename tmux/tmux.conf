
tmux_dir="~/.config/tmux"
tmux_conf_dir="$tmux_dir/conf"
tmux_plugins_dir="$tmux_dir/plugins"
#
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ',xterm-256color:RGB'

# Undercurl & Underscore colors support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'


set -g default-terminal "${TERM}"

set -gq allow-passthrough on
set -g visual-activity off
# Use the mouse
set -g mouse on
set -g set-clipboard on

set -g extended-keys on
set -g extended-keys-format csi-u

# Enables tracking of focus events, allows tmux to respond when the terminal
# window gains or looses focus
set-option -g focus-events on

# Sticky time after repeated commands
set -sg repeat-time 500

# Start numbering at 1 for windows and panes
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows if others are closed
set -g renumber-windows on

# Automatically rename windows based on the application within
set -g automatic-rename on
set -g automatic-rename-format "#{s|$HOME|~|:pane_current_path}"

# Use titles in tabs
set -g set-titles on
set -s escape-time 0

set -g detach-on-destroy off

# Enable vi keys.
setw -g mode-keys vi
# Bind Esc to exit copy-mode
bind-key -T copy-mode-vi 'Escape' send -X cancel
# start selecting text with "v", this is visual mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
# copy text with "y"
bind-key -T copy-mode-vi 'y' send -X copy-selection
# don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane


set -g status-interval 3

# Increase scrollback buffer size
set -g history-limit 1000000

# Change prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

bind-key x kill-pane
bind-key & kill-window

# Reload config
bind r source-file ~/.tmux.conf \; \
display-message "Config Reloaded."

unbind '"'
unbind %

# Resizing panes with Prefix H,J,K,L
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5

bind -n M-h previous-window
bind -n M-l next-window
bind -n M-t new-window
bind -n M-x kill-pane
bind -n M-s choose-tree -s

bind \\ split-pane -h -c "#{pane_current_path}"
bind - split-pane -v -c "#{pane_current_path}"


bind-key -n M-Left swap-window -t -1
bind-key -n M-Right swap-window -t +1

bind-key -n M-n split-pane -h -c "#{pane_current_path}"
bind-key -n M-d split-pane -v -c "#{pane_current_path}"



bind-key "o" run-shell "sesh connect \"$(
	sesh list -t | fzf-tmux -x 0 -y 100% -p 60%,35% \
		--no-sort --ansi --border-label ' sessions ' --prompt '⚡  ' \
		--header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
		--bind 'tab:down,btab:up' \
		--bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
		--bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
		--bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
		--bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
		--bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
		--bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(⚡  )+reload(sesh list)'
)\""


TMUX_FZF_LAUNCH_KEY="h"

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'sainnhe/tmux-fzf'

# =========================================================================================
# Zellij-like status bar / tab bar
set-option -g status-position top
set-option -g status-interval 1
set-option -g status-justify left
set-option -g status-style "bg=#1f1f28,fg=#dcd7ba"
set-option -g message-style "bg=#2a2a37,fg=#dcd7ba"
set-option -g mode-style "bg=#c4b28a,fg=#1f1f28,bold"
set-option -g status-left-length 40
set-option -g status-right-length 80

# Left: current session, background changes by tmux mode
set -g @session_style_normal "#[fg=#1f1f28,bg=#98bb6c,bold]"
set -g @session_style_prefix "#[fg=#1f1f28,bg=#e46876,bold]"
set -g @session_style_copy "#[fg=#1f1f28,bg=#e6c384,bold]"
set -g @session_style_sync "#[fg=#1f1f28,bg=#957fb8,bold]"
set -g @session_sep_normal "#[fg=#98bb6c,bg=#1f1f28,nobold]"
set -g @session_sep_prefix "#[fg=#e46876,bg=#1f1f28,nobold]"
set -g @session_sep_copy "#[fg=#e6c384,bg=#1f1f28,nobold]"
set -g @session_sep_sync "#[fg=#957fb8,bg=#1f1f28,nobold]"
set-option -g status-left "#{?client_prefix,#{@session_style_prefix},#{?pane_in_mode,#{@session_style_copy},#{?pane_synchronized,#{@session_style_sync},#{@session_style_normal}}}} 󱂬 #S#{?client_prefix, PREFIX,#{?pane_in_mode, COPY,#{?pane_synchronized, SYNC,}}} #{?client_prefix,#{@session_sep_prefix},#{?pane_in_mode,#{@session_sep_copy},#{?pane_synchronized,#{@session_sep_sync},#{@session_sep_normal}}}}#[default]"

# Middle: windows as tabs (capsule / pill style)
set-window-option -g window-status-separator "  "
set -g @win_style_normal "#[fg=#c8c093,bg=#2a2a37]"
set -g @win_style_activity "#[fg=#e6c384,bg=#3a3322,bold]"
set -g @win_style_bell "#[fg=#1f1f28,bg=#e46876,bold]"
set -g @win_divider_normal "#[fg=#8a8a9e,bg=#2a2a37]"
set -g @win_divider_activity "#[fg=#c0a36e,bg=#3a3322,bold]"
set -g @win_divider_bell "#[fg=#1f1f28,bg=#e46876,bold]"
set -g @win_edge_normal "#[fg=#2a2a37,bg=#1f1f28]"
set -g @win_edge_activity "#[fg=#3a3322,bg=#1f1f28]"
set -g @win_edge_bell "#[fg=#e46876,bg=#1f1f28]"
set-window-option -g window-status-format "#{?window_bell_flag,#{@win_edge_bell},#{?window_activity_flag,#{@win_edge_activity},#{@win_edge_normal}}}#{?window_bell_flag,#{@win_style_bell},#{?window_activity_flag,#{@win_style_activity},#{@win_style_normal}}} #I #{?window_bell_flag,#{@win_divider_bell},#{?window_activity_flag,#{@win_divider_activity},#{@win_divider_normal}}}│#{?window_bell_flag,#{@win_style_bell},#{?window_activity_flag,#{@win_style_activity},#{@win_style_normal}}} #(~/.config/tmux/scripts/window_icon.sh '#{pane_current_command}') #W #{?window_bell_flag,#{@win_edge_bell},#{?window_activity_flag,#{@win_edge_activity},#{@win_edge_normal}}}"
set-window-option -g window-status-current-format "#[fg=#7e9cd8,bg=#1f1f28]#[fg=#1f1f28,bg=#7e9cd8,bold] #I #[fg=#1f1f28,bg=#7e9cd8,bold]│ #(~/.config/tmux/scripts/window_icon.sh '#{pane_current_command}') #W #[fg=#7e9cd8,bg=#1f1f28]"
set-window-option -g window-status-activity-style "fg=#e6c384,bg=#3a3322,bold"
set-window-option -g window-status-bell-style "fg=#1f1f28,bg=#e46876,bold"

# Right: prefix indicator + user@host + time
set-option -g status-right "#{?client_prefix,#[fg=#1f1f28,bg=#e46876,bold] PREFIX ,}#[fg=#7aa89f,bg=#1f1f28]#[fg=#1f1f28,bg=#7aa89f] #h #[fg=#c4b28a,bg=#1f1f28]#[fg=#1f1f28,bg=#c4b28a] %Y-%m-%d %H:%M "
# =========================================================================================

set -g @yank_with_mouse on                          # Just select with the mouse to copy

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @vim_navigator_mapping_left "C-h"  # use C-h and C-Left
set -g @vim_navigator_mapping_right "C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""  # removes the C-\ binding

set -g @plugin 'navahas/tmux-grimoire'
set -g @grimoire-color '#6c67ea'
set -g @grimoire-position 'bottom-left'
set -g @grimoire-title ' SETSU '
set -g @grimoire-width '90%'          # Width as percentage
set -g @grimoire-height '70%'         # Height as percentage


# Border lines between panes are thicker
# single -> single lines using ACS or UTF-8 characters
# double -> double lines using UTF-8 characters
# heavy  -> heavy lines using UTF-8 characters
# simple -> simple ASCII characters
# number -> the pane number
set -g pane-border-lines single

# Indicate active pane by colouring only half of the border in windows with
# exactly two panes, by displaying arrow markers, by drawing both or neither.
# [off | colour | arrows | both]
set -g pane-border-indicators both

set -g pane-border-status top
set -g pane-border-format "#{pane_current_command} #{s|$HOME|~|:pane_current_path}"

# Run tpm
run '~/.tmux/plugins/tpm/tpm'
