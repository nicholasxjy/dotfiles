# Starship prompt - clean, informative, fast, and dark-muted
# Layout: context + path + git/runtime info + right-aligned time/duration

format = """
$os$username$hostname$directory$git_branch$git_status$git_state$python$nodejs$rust$golang$terraform$aws$docker_context$package$fill$cmd_duration$time$line_break$character"""

add_newline = true

[fill]
symbol = "─"
style = "bright-black"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vicmd_symbol = "[❮](bold blue)"

[os]
disabled = false
style = "bold blue"
format = "[$symbol]($style) "

[os.symbols]
Macos = "󰀵"
Linux = "󰌽"
Windows = "󰍲"

[username]
show_always = false
style_user = "bold green"
style_root = "bold red"
format = "[$user]($style)"

[hostname]
ssh_only = true
style = "bold yellow"
format = "[@$hostname]($style) "

[directory]
style = "bold blue"
read_only = " 󰌾"
read_only_style = "red"
truncation_length = 4
truncate_to_repo = true
fish_style_pwd_dir_length = 1
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "󰊢 "
style = "bold purple"
format = "on [$symbol$branch(:$remote_branch)]($style) "

[git_status]
style = "white"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "=${count} "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "?${count} "
stashed = "*${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "

[git_state]
style = "bold yellow"
format = '([$state( $progress_current/$progress_total)]($style)) '

[cmd_duration]
min_time = 1000
show_milliseconds = false
style = "yellow"
format = "[󰔟 $duration]($style) "

[time]
disabled = false
time_format = "%H:%M"
style = "bright-black"
format = "[ $time]($style)"

[package]
symbol = "󰏗 "
style = "green"
format = "[$symbol$version]($style) "

[python]
symbol = " "
style = "yellow"
format = '[${symbol}${pyenv_prefix}(${version})( \($virtualenv\))]($style) '

[nodejs]
symbol = " "
style = "green"
format = "[$symbol$version]($style) "

[rust]
symbol = " "
style = "red"
format = "[$symbol$version]($style) "

[golang]
symbol = " "
style = "cyan"
format = "[$symbol$version]($style) "

[terraform]
symbol = "󱁢 "
style = "bold purple"
format = "[$symbol$workspace]($style) "

[aws]
symbol = "󰸏 "
style = "yellow"
format = "[$symbol($profile)(@$region)]($style) "

[docker_context]
symbol = " "
style = "cyan"
format = "[$symbol$context]($style) "
only_with_files = true


[line_break]
disabled = false
